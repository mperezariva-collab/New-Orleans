<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HKG · Fragrance Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#C8131B;--black:#111;--white:#fff;--card-bg:#EAECEE;--sidebar:300px;}
html,body{height:100%;overflow:hidden;background:var(--white);}
body{font-family:'Montserrat',sans-serif;display:flex;}
.sidebar{width:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;padding:32px 0;position:relative;overflow:hidden;border-right:1px solid #ececec;}
.sb-logo{padding:0 32px 32px;display:flex;justify-content:flex-end;}
.sb-logo img{height:64px;}
.sb-search{padding:0 32px 8px;}
.sb-search input{width:100%;border:none;border-bottom:1.5px solid var(--red);background:transparent;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;padding:6px 0;outline:none;color:var(--black);text-align:right;letter-spacing:.5px;}
.sb-search input::placeholder{color:#bbb;font-size:11px;}
.nav-list{flex:1;display:flex;flex-direction:column;justify-content:center;padding-bottom:32px;}
.nav-item{padding:16px 32px 12px;text-align:right;cursor:pointer;user-select:none;}
.nav-label{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:400;letter-spacing:.8px;color:var(--black);transition:color .2s;display:block;margin-bottom:9px;}
.nav-item:hover .nav-label,.nav-item.active .nav-label{color:var(--red);}
.nav-item.active .nav-label{font-weight:500;}
.nav-line{display:block;height:1.5px;background:var(--red);width:100%;transform-origin:right;transform:scaleX(.5);transition:transform .25s;opacity:.5;}
.nav-item.active .nav-line{transform:scaleX(1);opacity:1;}
.nav-item:hover .nav-line{transform:scaleX(.8);opacity:.8;}
.cross-pattern{position:absolute;bottom:52px;left:16px;pointer-events:none;line-height:0;}
.admin-trigger{position:absolute;bottom:16px;right:16px;width:26px;height:26px;background:transparent;border:none;cursor:pointer;opacity:.12;transition:opacity .2s;color:var(--black);font-size:14px;display:flex;align-items:center;justify-content:center;}
.admin-trigger:hover{opacity:.45;}
.admin-panel{position:absolute;bottom:50px;right:10px;left:10px;background:white;border:1px solid #e8e8e8;border-radius:10px;padding:16px;transform:translateY(8px) scale(.98);opacity:0;pointer-events:none;transition:all .2s;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.08);max-height:calc(100vh - 80px);overflow:auto;}
.admin-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.admin-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#bbb;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.admin-logout{border:none;background:transparent;color:#bbb;font-family:'Montserrat',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:4px 0;}
.admin-logout:hover{color:var(--red);}
.admin-panel.locked .admin-content{display:none;}
.admin-panel.locked .admin-logout{display:none;}
.admin-panel:not(.locked) .admin-login{display:none;}
.admin-login{padding:6px 0 2px;}
.admin-error{font-size:9px;color:var(--red);min-height:14px;margin-top:4px;letter-spacing:.4px;}
.admin-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.ast{background:#f8f8f8;border-radius:8px;padding:10px 8px;text-align:center;}
.ast-v{font-size:18px;font-weight:600;color:var(--black);line-height:1;}
.ast-l{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#bbb;margin-top:3px;}
.admin-block{border-top:1px solid #f0f0f0;padding-top:12px;margin-top:12px;}
.admin-label{font-size:9px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#999;margin-bottom:8px;}
.admin-upload{border:1px dashed #ddd;border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:border-color .2s;display:block;}
.admin-upload:hover{border-color:var(--red);}
.admin-upload input{display:none;}
.admin-upload-text{font-size:10px;font-weight:500;color:#999;letter-spacing:.5px;}
.admin-upload-sub{font-size:9px;color:#ccc;margin-top:2px;}
.admin-select,.admin-input{width:100%;height:34px;border:1px solid #e6e6e6;border-radius:6px;background:white;color:#333;font-family:'Montserrat',sans-serif;font-size:11px;padding:0 10px;outline:none;margin-bottom:8px;}
.admin-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;}
.admin-action{height:34px;border:1px solid var(--black);background:var(--black);color:white;border-radius:6px;padding:0 12px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;}
.admin-action.secondary{background:white;color:var(--black);border-color:#ddd;}
.missing-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;max-height:72px;overflow:auto;}
.missing-chip{font-size:9px;color:#777;background:#f5f5f5;border-radius:999px;padding:5px 8px;border:none;cursor:pointer;}
.gallery-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;}
.gallery-thumb{aspect-ratio:1;border:1px solid #ededed;background:#f8f8f8;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;}
.gallery-section{margin-top:28px;padding-top:22px;border-top:1px solid #ececec;}
.gallery-title{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#bbb;margin-bottom:12px;}
.public-gallery{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.public-gallery .gallery-thumb{border-radius:4px;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:52px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid #ececec;gap:10px;flex-shrink:0;}
.topbar-title{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#bbb;}
.grid-badge{margin-left:auto;font-size:9px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:#bbb;display:flex;align-items:center;gap:8px;}
.vbtn{margin-left:auto;width:30px;height:30px;border:none;background:transparent;cursor:pointer;color:#ccc;transition:color .15s;display:flex;align-items:center;justify-content:center;border-radius:4px;}
.vbtn.active,.vbtn:hover{color:var(--black);}
.content{flex:1;overflow-y:auto;padding:28px;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:#e4e4e4;border-radius:10px;}
.brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(min-width:1400px){.brand-grid{grid-template-columns:repeat(4,1fr);}}
.brand-card{background:var(--card-bg);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:background .2s;}
.brand-card:hover{background:var(--red);}
.brand-card:hover img{filter:brightness(0) invert(1);transform:scale(1.04);}
.brand-card:hover .bc-init{color:rgba(255,255,255,.8);}
.brand-card img{max-width:62%;max-height:52%;object-fit:contain;transition:filter .2s,transform .25s;}
.bc-init{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:300;color:#b8bcc0;letter-spacing:5px;transition:color .2s;}
.list-wrap{background:white;border:1px solid #ececec;overflow:hidden;}
.list-head{display:grid;grid-template-columns:200px 1fr 130px 100px;padding:11px 24px;background:#f8f8f8;border-bottom:1px solid #ececec;gap:16px;}
.list-head span{font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:#bbb;}
.list-row{display:grid;grid-template-columns:200px 1fr 130px 100px;padding:13px 24px;gap:16px;border-bottom:1px solid #f4f4f4;align-items:center;cursor:pointer;transition:background .1s;}
.list-row:last-child{border-bottom:none;}
.list-row:hover{background:#fafafa;}
.lr-brand{font-size:11px;font-weight:600;color:var(--black);letter-spacing:.5px;text-transform:uppercase;}
.lr-name{font-size:12px;color:#555;}
.lr-cat{font-size:9px;background:#f0f0f0;padding:3px 10px;border-radius:2px;color:#777;letter-spacing:.8px;text-transform:uppercase;width:fit-content;}
.lr-price{font-size:12px;font-weight:600;text-align:right;}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.panel{position:fixed;left:0;right:0;top:0;bottom:0;background:white;z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.panel.open{transform:translateX(0);}
.ph{position:absolute;top:22px;left:24px;right:24px;z-index:5;display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
.ph-logo{width:96px;height:64px;background:var(--card-bg);display:flex;align-items:center;justify-content:center;padding:10px;flex-shrink:0;}
.ph-logo img{max-width:100%;max-height:100%;object-fit:contain;}
.ph-logo,.ph-info{display:none;}
.ph-info{flex:1;}
.ph-info h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--black);}
.ph-info p{font-size:11px;color:#bbb;margin-top:5px;letter-spacing:.5px;}
.close-btn{pointer-events:all;height:36px;border:1px solid #e8e8e8;background:white;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;color:#777;transition:all .15s;border-radius:0;padding:0 14px;}
.close-btn:hover{background:var(--black);color:white;border-color:var(--black);}
.pb{flex:1;overflow-y:auto;padding:0;}
.pb::-webkit-scrollbar{width:3px;}
.pb::-webkit-scrollbar-thumb{background:#e4e4e4;border-radius:10px;}
.ptable{width:100%;border-collapse:collapse;}
.ptable th{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#bbb;padding:8px 0;text-align:left;border-bottom:1px solid #ececec;}
.ptable td{font-size:12px;padding:12px 0;border-bottom:1px solid #f4f4f4;color:#444;}
.ptable tr:last-child td{border-bottom:none;}
.ptable td:first-child{color:var(--black);font-weight:400;}
.pt-cat{font-size:9px;background:#f0f0f0;padding:3px 10px;border-radius:2px;color:#777;letter-spacing:.8px;text-transform:uppercase;}
.pt-price{font-weight:600;text-align:right;}
.product-grid{display:block;background:white;}
.product-card{position:relative;background:white;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;overflow:hidden;}
.product-card.is-top{min-height:100vh;padding:108px 54px 42px;border-bottom:1px solid #f1f1f1;}
.product-list-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:34px 28px;padding:54px;align-items:start;}
.product-list-grid.count-1{grid-template-columns:minmax(0,420px);justify-content:center;}
.product-list-grid.count-2{grid-template-columns:repeat(2,minmax(0,420px));justify-content:center;}
.product-list-grid.count-3{grid-template-columns:repeat(3,minmax(0,1fr));}
.product-card.is-grid{min-height:0;padding:0 10px 24px;border-bottom:none;}
.product-brand{position:absolute;top:54px;left:54px;z-index:2;width:min(560px,62%);height:142px;display:flex;align-items:flex-start;justify-content:flex-start;}
.product-brand img{max-width:100%;max-height:100%;object-fit:contain;object-position:left top;}
.product-brand-text{font-family:'Cormorant Garamond',serif;font-size:clamp(64px,9vw,148px);font-weight:400;line-height:.86;letter-spacing:0;text-transform:uppercase;color:var(--black);}
.product-crosses{position:absolute;top:0;right:32px;width:188px;height:520px;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:64px;align-items:center;justify-items:center;color:var(--black);font-size:56px;font-weight:300;line-height:1;z-index:1;pointer-events:none;overflow:hidden;}
.product-media{position:relative;z-index:2;width:min(520px,62%);height:min(520px,55vh);display:flex;align-items:flex-end;justify-content:center;background:#fff;margin:36px auto 26px;}
.product-media img{max-width:100%;max-height:100%;object-fit:contain;}
.product-card.is-grid .product-media{width:100%;height:280px;margin:0 0 16px;align-items:flex-end;}
.product-card.is-grid .product-empty{width:140px;height:190px;}
.product-empty{width:180px;height:230px;border:1px dashed #ddd;display:flex;align-items:center;justify-content:center;color:#c5c5c5;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;text-align:center;line-height:1.5;padding:12px;}
.product-meta{position:relative;z-index:2;text-align:center;width:min(680px,90%);}
.product-sku{font-size:26px;font-weight:300;color:var(--black);letter-spacing:.5px;margin-bottom:6px;}
.product-name{font-size:28px;font-weight:600;line-height:1.18;color:#262326;text-transform:uppercase;letter-spacing:.4px;}
.top-tag{position:absolute;left:54px;bottom:42px;z-index:3;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);}
.product-card.is-grid .product-sku{font-size:16px;margin-bottom:5px;}
.product-card.is-grid .product-name{font-size:16px;line-height:1.15;}
.product-card.is-grid .product-sub{margin-top:8px;}
.product-sub{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap;}
.product-price{font-size:14px;font-weight:600;color:var(--black);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black);color:white;padding:10px 22px;border-radius:2px;font-size:11px;font-weight:500;letter-spacing:.5px;transition:transform .3s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes fi{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.brand-card{animation:fi .3s ease both;}
@media(max-width:900px){
  html,body{height:auto;min-height:100%;overflow:auto;}
  body{display:block;}
  .sidebar{width:100%;height:auto;padding:18px 0 0;border-right:none;border-bottom:1px solid #ececec;overflow:visible;}
  .sb-logo{padding:0 18px 14px;justify-content:flex-start;}
  .sb-logo img{height:46px;}
  .sb-search{padding:0 18px 12px;}
  .sb-search input{text-align:left;font-size:16px;padding:10px 0;}
  .nav-list{flex:none;display:flex;flex-direction:row;justify-content:flex-start;gap:0;padding:0 10px;overflow-x:auto;}
  .nav-item{padding:14px 12px 11px;text-align:left;min-width:max-content;}
  .nav-label{font-size:11px;margin-bottom:7px;}
  .cross-pattern,.admin-trigger{display:none;}
  .admin-panel{position:fixed;inset:14px;bottom:auto;left:14px;right:14px;max-height:calc(100vh - 28px);transform:translateY(16px) scale(.98);z-index:120;padding:18px;}
  .admin-panel.open{transform:translateY(0) scale(1);}
  .admin-stats{grid-template-columns:repeat(3,1fr);}
  .main{height:auto;min-height:calc(100vh - 150px);overflow:visible;}
  .topbar{height:46px;padding:0 18px;}
  .grid-badge{font-size:8px;}
  .content{padding:18px;overflow:visible;}
  .brand-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .brand-card{aspect-ratio:1.08;}
  .brand-card img{max-width:72%;max-height:58%;}
  .public-gallery{grid-template-columns:repeat(3,1fr);}
  .panel{left:0;width:100vw;}
  .ph{padding:20px 18px;gap:12px;}
  .ph-logo{width:74px;height:54px;}
  .ph-info h2{font-size:23px;}
  .pb{padding:0;}
  .product-grid{display:block;}
  .product-card.is-top{min-height:100vh;padding:92px 18px 30px;}
  .product-list-grid,.product-list-grid.count-1,.product-list-grid.count-2,.product-list-grid.count-3{grid-template-columns:1fr;gap:30px;padding:32px 18px;}
  .product-card.is-grid{padding:0 6px 18px;}
  .product-brand{top:28px;left:18px;width:78%;height:76px;}
  .product-brand-text{font-size:clamp(42px,17vw,74px);}
  .product-crosses{right:-2px;top:0;width:96px;height:330px;grid-auto-rows:40px;font-size:34px;}
  .product-media{width:min(320px,72%);height:min(360px,48vh);margin-bottom:22px;}
  .product-card.is-grid .product-media{height:250px;margin-bottom:14px;}
  .product-sku{font-size:18px;}
  .product-name{font-size:19px;}
  .product-card.is-grid .product-sku{font-size:15px;}
  .product-card.is-grid .product-name{font-size:15px;}
  .top-tag{left:18px;bottom:24px;font-size:9px;}
  .product-price{font-size:13px;}
  .ptable th{font-size:8px;letter-spacing:1.2px;}
  .ptable td{font-size:11px;}
  .toast{left:14px;right:14px;bottom:14px;transform:translateY(80px);text-align:center;white-space:normal;}
  .toast.show{transform:translateY(0);}
}
@media(max-width:420px){
  .brand-grid{grid-template-columns:1fr 1fr;}
  .admin-row{grid-template-columns:1fr;}
  .admin-action{width:100%;}
}
</style>
</head>

        <div class="admin-upload-sub">Uses the product selected above</div>
      </label>

function he(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function normName(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\.[a-z0-9]+$/,'').replace(/\b(edp|edt|parfum|spray|sp|fg|rfl|new)\b/g,'')
    .replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' ');
}
function productKey(p){return p.itemNumber?String(p.itemNumber):normName(p.name);}
function productImageFor(p){
  var key=productKey(p),name=normName(p.name),best=null,bscore=0;
  if(customProductImages[key]) return customProductImages[key];
  if(customProductImages[name]) return customProductImages[name];
  Object.keys(PRODUCT_IMAGES).forEach(function(k){
    var nk=normName(k),score=0;
    if(nk===name) score=100;
    else if(name.indexOf(nk)>-1||nk.indexOf(name)>-1) score=Math.min(nk.length,name.length);
    if(score>bscore){best=PRODUCT_IMAGES[k];bscore=score;}
  });
  return best;
}
function fileProductMatchKey(file){
  return normName((file.name||'').replace(/\.[^.]+$/,''));
}
function productBrandMarkup(b){
  if(b.logo) return '<img src="'+b.logo+'" alt="'+he(b.name)+'">';
  return '<span class="product-brand-text">'+he(b.name)+'</span>';
}
function topSellerForBrand(b,prods){
  var savedKey=topSellers[b.code];
  return prods.find(function(p){return productKey(p)===savedKey;})||prods[0]||null;
}
function productCardMarkup(p,opts){
  var img=productImageFor(p),cls=opts&&opts.top?'product-card is-top':'product-card is-grid';
  return '<article class="'+cls+'">'
    +(opts&&opts.brand?'<div class="product-brand">'+opts.brand+'</div>':'')
    +(opts&&opts.crosses?'<div class="product-crosses" aria-hidden="true">'+Array(30).fill('<span>+</span>').join('')+'</div>':'')
    +(opts&&opts.top?'<div class="top-tag">Top seller</div>':'')
    +'<div class="product-media">'+(img?'<img src="'+img+'" alt="'+he(p.name)+'" loading="lazy">':'<div class="product-empty">No image</div>')+'</div>'
    +'<div class="product-meta">'
    +'<div class="product-sku">'+he(p.itemNumber||'\u2014')+'</div>'
    +'<div class="product-name">'+he(p.name)+'</div>'
    +'<div class="product-sub"><span class="pt-cat">'+he(p.category||'\u2014')+'</span><span class="product-price">'+(p.price?'$'+p.price.toFixed(2):'\u2014')+'</span></div>'
    +'</div></article>';
}

function openPanel(code){
  var b=catalog.find(function(x){return x.code===code;}); if(!b) return;
  var prods=activeFilter?b.products.filter(function(p){return p.category&&p.category.toUpperCase().indexOf(activeFilter)>-1;}):b.products;
  document.getElementById('pLogo').innerHTML=b.logo?'<img src="'+b.logo+'" alt="'+he(b.name)+'" style="max-width:100%;max-height:100%;object-fit:contain;">':'<span class="bc-init">'+he(b.name.slice(0,2).toUpperCase())+'</span>';
  document.getElementById('pName').textContent=b.name;
  document.getElementById('pSub').textContent=prods.length+' product'+(prods.length!==1?'s':'')+' in this collection';
  var brandMark=productBrandMarkup(b);
  var top=topSellerForBrand(b,prods);
  var rest=top?prods.filter(function(p){return productKey(p)!==productKey(top);}):prods.slice();
  var gridCount=Math.min(rest.length,3);
  var hero=top?productCardMarkup(top,{top:true,brand:brandMark,crosses:true}):'';
  var grid=rest.length?'<div class="product-list-grid count-'+gridCount+'">'+rest.map(function(p){return productCardMarkup(p);}).join('')+'</div>':'';
  document.getElementById('pBody').innerHTML=hero+grid;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow='hidden';
}

function parseCSV(text){
  var rows=[],row=[],cell='',q=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i],nx=text[i+1];
    if(ch==='"'&&q&&nx==='"'){cell+='"';i++;continue;}
    if(ch==='"'){q=!q;continue;}
    if(ch===','&&!q){row.push(cell.trim());cell='';continue;}
    if((ch==='\n'||ch==='\r')&&!q){
      if(ch==='\r'&&nx==='\n') i++;
      row.push(cell.trim());
      if(row.some(function(v){return v!=='';})) rows.push(row);
      row=[];cell='';
      continue;
    }
    cell+=ch;
  }
  row.push(cell.trim());
  if(row.some(function(v){return v!=='';})) rows.push(row);
  return rows;
}

  if(!requireAdmin()) return;
  var file=input.files[0],code=document.getElementById('logoBrandSelect').value;
  if(!file||!code) return;
  readImage(file,function(src){
    var b=catalog.find(function(x){return x.code===code;});
    if(!b) return;
    b.logo=src;
    customLogos[code]=src;
    saveData();render();refreshAdminStats();
    showToast('Logo updated for '+b.name);
  });
  input.value='';
}
function handleProductImageFile(input){
  if(!requireAdmin()) return;
  var file=input.files[0],key=document.getElementById('productImageSelect').value;
  if(!file||!key) return;
  readImage(file,function(src){
    customProductImages[key]=src;
    saveData();render();refreshAdminStats();
    showToast('Product image updated');
  });
  input.value='';
}
function handleProductBulkFiles(input){
  if(!requireAdmin()) return;
  var files=Array.prototype.slice.call(input.files||[]);
  if(!files.length) return;
  var products=allProds(),left=files.length,matched=0;
  files.forEach(function(file){
    var fk=fileProductMatchKey(file);
    var product=products.find(function(p){return normName(p.name)===fk;})||products.find(function(p){
      var pn=normName(p.name);
      return pn.indexOf(fk)>-1||fk.indexOf(pn)>-1;
    });
    readImage(file,function(src){
      if(product){customProductImages[productKey(product)]=src;matched++;}
      left--;
      if(!left){
        saveData();render();refreshAdminStats();
        showToast(matched+' product image'+(matched!==1?'s':'')+' matched');
      }
    });
  });
  input.value='';
}
function handleGalleryFiles(input){
  if(!requireAdmin()) return;
  var files=Array.prototype.slice.call(input.files||[]);
  if(!files.length) return;
  var left=files.length,added=0;
  files.forEach(function(file){
    readImage(file,function(src){
      gallery.push(src);added++;left--;
      if(!left){saveData();render();refreshAdminStats();showToast(added+' gallery image'+(added!==1?'s':'')+' added');}
    });
  });
  input.value='';
}
function readImage(file,done){
  if(!/^image\//.test(file.type)){showToast('Please choose an image file');return;}
  var reader=new FileReader();
  reader.onload=function(e){done(e.target.result);};
  reader.onerror=function(){showToast('Could not read image');};
  reader.readAsDataURL(file);
}
function clearGallery(){
  if(!requireAdmin()) return;
  gallery=[];saveData();render();refreshAdminStats();showToast('Gallery cleared');
}
function downloadData(){
  if(!requireAdmin()) return;
  var payload=JSON.stringify({catalog:catalog.map(function(b){return {code:b.code,name:b.name,products:b.products};}),logos:customLogos,productImages:customProductImages,topSellers:topSellers,gallery:gallery},null,2);
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([payload],{type:'application/json'}));
  a.download='hkg-catalog-admin-export.json';
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
}
function handleFile(input){
  if(!requireAdmin()) return;
  var file=input.files[0]; if(!file) return;
  showToast('Loading '+file.name+'\u2026');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows;
      if(file.name.toLowerCase().slice(-4)==='.csv'){
        rows=parseCSV(e.target.result);
      }else{
        var wb=XLSX.read(e.target.result,{type:'binary'});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
      }
      importRows(rows,file.name);
    }catch(err){showToast('\u274c '+err.message);}
  };
  file.name.toLowerCase().slice(-4)==='.csv'?reader.readAsText(file):reader.readAsBinaryString(file);
  input.value='';
}
function importRows(rows,fname){
  var hi=-1,headers=[];
  for(var i=0;i<Math.min(6,rows.length);i++){
    var r=rows[i].map(function(c){return String(c||'').toLowerCase().trim();});
    if(r.indexOf('brand')>-1){hi=i;headers=r;break;}
  }
  if(hi===-1){showToast('\u274c Brand column not found');return;}
  function col(n){return headers.findIndex(function(h){return h.indexOf(n)>-1;});}
  var BC=col('brand'),NC=col('product name')>-1?col('product name'):col('name');
  var AC=col('total available')>-1?col('total available'):col('available');
  var PC=col('sales price')>-1?col('sales price'):col('price');
  var CC=col('category'),IC=col('item number')>-1?col('item number'):col('item');
  var nc={};
  for(var i=hi+1;i<rows.length;i++){
    var r=rows[i],brand=String(r[BC]||'').trim();
    if(!brand||brand==='undefined') continue;
    if(!nc[brand]){var ex=catalog.find(function(b){return b.code===brand;});nc[brand]={code:brand,name:ex?ex.name:brand,logo:ex?ex.logo:null,products:[]};}
    nc[brand].products.push({brand:brand,
      name:NC>-1?String(r[NC]||'').trim():'',itemNumber:IC>-1?String(r[IC]||'').trim():'',
      available:AC>-1?(parseInt(r[AC])||0):0,category:CC>-1?String(r[CC]||'').trim():'',
      price:PC>-1?(parseFloat(r[PC])||0):0});
  }
  catalog=Object.values(nc);
  catalog.forEach(function(b){b.logo=customLogos[b.code]||LOGOS[b.code]||b.logo||null;});
  saveData();render();refreshAdminStats();
  showToast('\u2705 '+catalog.length+' brands updated from '+fname);
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3500);
}
render();refreshAdminStats();

</script>
